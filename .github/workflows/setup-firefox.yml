name: Setup Firefox

on:
  workflow_call:
    # This is a reusable workflow that can be called by other workflows
    outputs:
      firefox-version:
        description: "The exact Firefox version installed in the cache"
        value: ${{ jobs.setup-firefox.outputs.firefox-version }}
      week:
        description: "The current year-week used for the Firefox cache key"
        value: ${{ jobs.setup-firefox.outputs.week }}

# Concurrency group ensures only one Firefox setup runs at a time across all workflows
# This prevents race conditions when multiple workflows try to cache Firefox simultaneously
concurrency:
  group: setup-firefox-${{ github.repository }}
  cancel-in-progress: false

jobs:
  setup-firefox:
    name: Setup Firefox Cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      firefox-version: ${{ steps.get-firefox-version.outputs.version }}
      week: ${{ steps.week.outputs.week }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Get current year-week for Firefox cache key (updates weekly)
      - name: Get current week
        id: week
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      # Cache Firefox binary to speed up installation
      # Cache key includes year-week to refresh weekly and get Firefox updates
      - name: Cache Firefox binary
        id: firefox-cache
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/firefox
          key: ${{ runner.os }}-firefox-latest-v7-${{ steps.week.outputs.week }}

      # Download & install latest Firefox only if cache miss
      - name: Download & install latest Firefox
        if: steps.firefox-cache.outputs.cache-hit != 'true'
        id: setup-firefox
        uses: browser-actions/setup-firefox@latest

      # Rename cache directory from "latest" to actual version for tc.find() compatibility
      - name: Fix Firefox cache for tool-cache API
        if: steps.firefox-cache.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ steps.setup-firefox.outputs.firefox-version }}"
          if [ -d "/opt/hostedtoolcache/firefox/latest" ]; then
            echo "Renaming /opt/hostedtoolcache/firefox/latest to /opt/hostedtoolcache/firefox/$VERSION"
            mv /opt/hostedtoolcache/firefox/latest "/opt/hostedtoolcache/firefox/$VERSION"
            echo "Firefox $VERSION cached for tool-cache API compatibility"
          fi

      # Read the exact Firefox version from the cache directory
      # Works for both cache-hit (version already present) and cache-miss (version just installed)
      - name: Get Firefox version from cache
        id: get-firefox-version
        run: |
          if [ ! -d "/opt/hostedtoolcache/firefox" ]; then
            echo "Firefox cache directory not found"
            exit 1
          fi
          # Use sort -V (version sort) and take the highest version in case of multiple directories
          VERSION=$(ls /opt/hostedtoolcache/firefox/ | grep -v '^latest$' | sort -V | tail -1)
          if [ -z "$VERSION" ]; then
            echo "No Firefox version found in cache directory"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Firefox version: $VERSION"
